name: Build
permissions: write-all
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version to release'
        required: false
  # Release build: triggered automatically when the version in package.json is
  # bumped on the main branch. The detected version is fed into the build as if
  # it had been passed to the "Tag version to release" dispatch input.
  push:
    branches:
      - main
    paths:
      - 'package.json'
  # Nightly build: produces a rolling pre-release from the dev branch every day.
  schedule:
    - cron: '0 18 * * *'

jobs:
  # Resolves which build to run for the current trigger and exposes the
  # parameters (version / ref / nightly flag) consumed by the jobs below.
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.resolve.outputs.should_build }}
      version: ${{ steps.resolve.outputs.version }}
      ref: ${{ steps.resolve.outputs.ref }}
      is_nightly: ${{ steps.resolve.outputs.is_nightly }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve build parameters
        id: resolve
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            schedule)
              # Nightly build from the dev branch (create the branch to enable).
              if ! git ls-remote --exit-code --heads origin dev >/dev/null 2>&1; then
                echo "::warning::dev branch does not exist - skipping nightly build."
                echo "should_build=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              # Only build when dev has new commits since the last nightly. The
              # nightly tag points at the dev commit the previous nightly built
              # from, so an unchanged HEAD means there is nothing new to release.
              DEV_SHA=$(git ls-remote origin refs/heads/dev | awk '{print $1}')
              NIGHTLY_REFS=$(git ls-remote --tags origin nightly)
              LAST_SHA=$(echo "$NIGHTLY_REFS" | awk '/\^\{\}$/{print $1}')
              [ -z "$LAST_SHA" ] && LAST_SHA=$(echo "$NIGHTLY_REFS" | awk 'NR==1{print $1}')

              if [ -n "$LAST_SHA" ] && [ "$DEV_SHA" == "$LAST_SHA" ]; then
                echo "No new commits on dev since last nightly ($DEV_SHA) - skipping."
                echo "should_build=false" >> "$GITHUB_OUTPUT"
              else
                echo "Nightly build of dev (dev=$DEV_SHA, last=${LAST_SHA:-<none>})."
                echo "is_nightly=true" >> "$GITHUB_OUTPUT"
                echo "ref=$DEV_SHA" >> "$GITHUB_OUTPUT"
                echo "version=" >> "$GITHUB_OUTPUT"
                echo "should_build=true" >> "$GITHUB_OUTPUT"
              fi
              ;;
            push)
              # Release build triggered by a version bump on main.
              NEW_VERSION=$(jq -r '.version' package.json)
              OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")
              if [ -n "$NEW_VERSION" ] && [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
                echo "Version bump detected: ${OLD_VERSION:-<none>} -> $NEW_VERSION"
                echo "is_nightly=false" >> "$GITHUB_OUTPUT"
                echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
                echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                echo "should_build=true" >> "$GITHUB_OUTPUT"
              else
                echo "No version change in package.json - skipping build."
                echo "should_build=false" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              # Manual dispatch: build the version typed into the input (empty = beta).
              echo "is_nightly=false" >> "$GITHUB_OUTPUT"
              echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
              echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    needs: [setup]
    if: needs.setup.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            format: 7z
          - os: windows-latest
            arch: x64
            format: nsis
          - os: windows-latest
            arch: arm64
            format: 7z
          - os: windows-latest
            arch: arm64
            format: nsis

          - os: ubuntu-latest
            arch: x64
            format: deb
          - os: ubuntu-latest
            arch: x64
            format: rpm
          - os: ubuntu-latest
            arch: x64
            format: pacman
          - os: ubuntu-latest
            arch: arm64
            format: deb
          - os: ubuntu-latest
            arch: arm64
            format: rpm
          - os: ubuntu-latest
            arch: arm64
            format: pacman

          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    name: Build ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.format && '-' || '' }}${{ matrix.format || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup pnpm
        run: npm install -g pnpm

      - name: Determine and Update Version
        shell: bash
        env:
          INPUT_VERSION: ${{ needs.setup.outputs.version }}
          IS_NIGHTLY: ${{ needs.setup.outputs.is_nightly }}
        run: |
          GIT_COMMIT_HASH=$(git rev-parse --short HEAD)
          VERSION=$(jq -r '.version' package.json)

          if [ "$INPUT_VERSION" == "" ]; then
            BASE_VERSION=$(echo $VERSION | awk -F. '{print $1"."$2"."$3+1}')
            if [ "$IS_NIGHTLY" == "true" ]; then
              VERSION_PREFIX=nightly
            else
              VERSION_PREFIX=${VERSION_PREFIX:-beta}
            fi
            RELEASE_VERSION="${BASE_VERSION}-${VERSION_PREFIX}-${GIT_COMMIT_HASH}"
          else
            CLEAN_VERSION=$(echo "$INPUT_VERSION" | sed 's/^v//')
            if [[ ! "$CLEAN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version format: $INPUT_VERSION"
              exit 1
            fi
            RELEASE_VERSION="$CLEAN_VERSION"
          fi

          jq --arg version "$RELEASE_VERSION" '.version = $version' package.json > tmp.json && mv tmp.json package.json

      - name: Install Build Tools
        if: matrix.os == 'ubuntu-latest' && matrix.format == 'pacman'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools fakeroot

      - name: Install Dependencies and Prepare
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          SKIP_PREPARE=1 pnpm install
          pnpm prepare --${{ matrix.arch }}

      # Configure macOS signing only when secrets exist. We write the CSC_*/APPLE_*
      # vars to $GITHUB_ENV exclusively in the signed case — setting them to empty
      # strings would make electron-builder resolve an empty CSC_LINK to the project
      # dir and fail with "<projectDir> not a file". For unsigned builds we instead
      # set CSC_IDENTITY_AUTO_DISCOVERY=false so signing is cleanly skipped.
      - name: Configure Apple Signing
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "Apple signing secrets found - building SIGNED, notarized macOS package."
            mkdir -p ~/.appstoreconnect/private_keys
            echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
            {
              echo "CSC_LINK=${{ secrets.APPLE_CERTIFICATE }}"
              echo "CSC_KEY_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
              echo "CSC_NAME=${{ secrets.APPLE_SIGNING_IDENTITY }}"
              echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY }}"
              echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
              echo "APPLE_API_KEY=$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
            } >> "$GITHUB_ENV"
          else
            echo "::warning::APPLE_* secrets not present - building UNSIGNED, un-notarized macOS package."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm build:win ${{ matrix.format }} --${{ matrix.arch }}
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            pnpm build:linux ${{ matrix.format }} --${{ matrix.arch }}
          else
            pnpm build:mac --${{ matrix.arch }}
          fi

      - name: Add Portable Flag
        if: matrix.os == 'windows-latest' && matrix.format == '7z'
        shell: pwsh
        run: |
          New-Item -Path "PORTABLE" -ItemType File
          Get-ChildItem dist/*portable.7z | ForEach-Object {
            7z a $_.FullName PORTABLE
          }

      - name: Generate latest.yml
        shell: bash
        run: SKIP_CHANGELOG=1 pnpm updater

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}${{ matrix.format && '-' || '' }}${{ matrix.format || '' }}
          path: |
            dist/ClashApp*
            !dist/*.plist
            !dist/*blockmap*
            latest.yml
            changelog.md

  # Rolling pre-release for main builds (manual dispatch / version bump).
  pre-release:
    needs: [setup, build]
    if: needs.setup.outputs.is_nightly != 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Delete current release assets
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: pre-release
          deleteOnlyFromDrafts: false

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Prerelease
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          body_path: bin/changelog.md
          files: |
            bin/latest.yml
            bin/dist/*
          prerelease: true

  # Rolling nightly pre-release built from the dev branch.
  nightly:
    needs: [setup, build]
    if: needs.setup.outputs.is_nightly == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Delete current nightly assets
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          deleteOnlyFromDrafts: false

      # Point the nightly tag at the exact dev commit that was built. The setup
      # job reads this tag on the next run to decide whether dev has new commits.
      - name: Move nightly tag
        shell: bash
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -f nightly
          git push -f origin nightly

      - name: Publish Nightly
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body_path: bin/changelog.md
          files: |
            bin/latest.yml
            bin/dist/*
          prerelease: true

  release:
    if: needs.setup.outputs.version != '' && needs.setup.outputs.is_nightly != 'true'
    needs: [setup, build]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          fetch-tags: 'true'

      - name: Normalize Release Version
        id: release_version
        shell: bash
        run: |
          CLEAN_VERSION=$(echo "${{ needs.setup.outputs.version }}" | sed 's/^v//')
          if [[ ! "$CLEAN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ needs.setup.outputs.version }}"
            exit 1
          fi

          echo "version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Version
        shell: bash
        run: |
          CLEAN_VERSION="${{ steps.release_version.outputs.version }}"
          jq --arg version "$CLEAN_VERSION" '.version = $version' package.json > tmp.json && mv tmp.json package.json

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add package.json
          if git diff --cached --quiet; then
            echo "package.json already uses $CLEAN_VERSION"
          else
            git commit -m "update version to $CLEAN_VERSION"
            git push
          fi

      - name: Install Dependencies and Updater
        shell: bash
        run: |
          npm install -g pnpm
          SKIP_PREPARE=1 pnpm install
          pnpm updater

      - uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Delete Current
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release_version.outputs.version }}
          deleteOnlyFromDrafts: false

      - name: Publish Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.version }}
          body_path: changelog.md
          files: |
            latest.yml
            bin/dist/*
