appId: com.koala-clash
productName: Koala Clash
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!aur/*'
  - '!images/*'
  - '!scripts/*'
  - '!extra/*'
  - '!tailwind.config.js'
  - '!postcss.config.js'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: './extra/'
    to: ''
protocols:
  name: 'Koala Clash URI Scheme'
  schemes:
    - 'clash'
    - 'mihomo'
    - 'koala-clash'
win:
  target:
    - nsis
    - 7z
  artifactName: ${productName}_${arch}-portable.${ext}
nsis:
  artifactName: ${productName}_${arch}-setup.${ext}
  uninstallDisplayName: ${productName}
  allowToChangeInstallationDirectory: true
  oneClick: false
  perMachine: true
  createDesktopShortcut: true
  include: build/nsis/installer.nsh
mac:
  target:
    - pkg
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  artifactName: ${productName}_${arch}.${ext}
pkg:
  allowAnywhere: false
  allowCurrentUserHome: false
  # background:
  #   alignment: bottomleft
  #   file: build/background.png
linux:
  desktop:
    entry:
      Name: Koala Clash
      MimeType: 'x-scheme-handler/clash;x-scheme-handler/mihomo;x-scheme-handler/koala-clash'
  target:
    - deb
    - rpm
    - pacman
  maintainer: coolcoala
  category: Utility
  artifactName: ${productName}_${arch}.${ext}
deb:
  afterInstall: 'build/linux/postinst'
rpm:
  afterInstall: 'build/linux/postinst'
pacman:
  afterInstall: 'build/linux/postinst'
  artifactName: ${productName}_${arch}.pkg.tar.xz
npmRebuild: true
publish: []
